# fly.toml app configuration file generated for rsshub-joker on 2026-05-04T23:40:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rsshub-joker'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 1200
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
